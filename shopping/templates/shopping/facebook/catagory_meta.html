{% comment %} catagory_meta.html {% endcomment %}

{# 1. Page Title #}
<title>{{ category.name }} | Uttar World Elite Lifestyle Store</title>

{# 2. SEO Description #}
<meta name="description" content="{{ category.description|striptags|truncatechars:160 }}">
<meta name="keywords" content="{{ category.meta_keywords }}">

{# 3. Open Graph Tags (Facebook/WhatsApp) #}
<meta property="og:type" content="website">
<meta property="og:title" content="{{ category.name|safe }} | Uttar World Elite Lifestyle Store" />
<meta property="og:description" content="{{ category.description|striptags|truncatechars:160 }}" />
<meta property="og:url" content="https://uttarworld.com{{ request.path }}">

{# 4. Image Logic #}
{% if category.image_url %}
    <meta property="og:image" content="{{ category.image_url }}" />
{% else %}
    <meta property="og:image" content="https://www.uttarworld.com/static/images/logo.png" />
{% endif %}
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />

{# 5. Twitter Card #}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ category.name|safe }}">
<meta name="twitter:description" content="{{ category.description|striptags|truncatechars:160 }}">
