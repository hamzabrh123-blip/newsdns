{% comment %} home_meta.html {% endcomment %}

<title>
{{ home_seo.title }}
</title>

<meta name="description"
content="{{ home_seo.meta_description|default:''|striptags }}">

<meta name="keywords"
content="{{ home_seo.meta_keywords|default:'' }}">

<meta name="robots" content="index, follow">

<meta property="og:type" content="website">

<meta property="og:title"
content="{{ home_seo.title }}" />

<meta property="og:description"
content="{{ home_seo.meta_description|default:''|striptags }}" />

<meta property="og:url"
content="{{ request.build_absolute_uri }}">

{% if home_seo.og_image %}
<meta property="og:image"
content="{{ home_seo.og_image.url }}" />
{% else %}
<meta property="og:image"
content="https://www.uttarworld.com/static/images/logo.png" />
{% endif %}

<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />

<meta name="twitter:card"
content="summary_large_image">

<meta name="twitter:title"
content="{{ home_seo.title }}">

<meta name="twitter:description"
content="{{ home_seo.meta_description|default:''|striptags }}">

{% if home_seo.og_image %}
<meta name="twitter:image"
content="{{ home_seo.og_image.url }}">
{% else %}
<meta name="twitter:image"
content="https://www.uttarworld.com/static/images/logo.png">
{% endif %}

<link rel="canonical"
href="https://www.uttarworld.com/">
