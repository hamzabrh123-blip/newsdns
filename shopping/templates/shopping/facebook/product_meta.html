<meta name="description" content="Buy {{ product.title }} at just ₹{{ product.price_display }}. Best deals, high quality, and fast shipping available only on Uttar World Elite Life Style Store. Shop now!">
<meta name="keywords" content="{{ product.title }}, {{ product.title|slugify }}, online shopping india, best price {{ product.title }}, buy {{ product.title }} online, Uttar World Elite Life Style Store deals, {{ product.category.name|default:'fashion' }} deals">
<meta property="og:type" content="product">
<meta property="og:title" content="{{ product.title|safe }} | ₹{{ product.price_display }} Available" />
{% with s_price=product.variants.all.0.coupons.all.0.selling_price|default:product.price_display %}
<meta property="og:description" content="Get it for just ₹{{ s_price|floatformat:0 }} at {{ product.variants.all.0.coupons.all.0.store_name|default:'Uttar World' }}. Best deals on {{ product.category.name|default:'lifestyle' }} products. Shop now!">
{% endwith %}
<meta property="og:image" content="{{ product.variants.all.0.image_url }}" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta property="product:price:amount" content="{{ product.price_display }}">
<meta property="product:price:currency" content="INR">
<meta property="product:availability" content="in stock">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ product.title }}">
<meta name="twitter:description" content="Price: ₹{{ product.price_display }} - Premium quality deals at {{ product.variants.all.0.coupons.all.0.store_name|default:'Uttar World Elite Lifestyle Store' }}!">
<meta name="twitter:image" content="https://res.cloudinary.com/dvoqsrkkq/image/upload/c_pad,h_630,w_1200/l_text:Arial_60_bold:₹{{ product.price_display|urlencode }},co_rgb:b12704,g_south_east,x_50,y_50/{{ product.variants.all.0.image_url }}">
