<meta property="og:type" content="product">

<meta property="og:title"
content="{{ product.title|truncatechars:70 }}">

<meta property="og:description"
content="{{ product.meta_description|truncatechars:180 }}">

<meta property="og:image"
content="https://res.cloudinary.com/dvoqsrkkq/image/fetch/c_fit,w_600,h_315,q_auto/{{ product.variants.all.0.image_url }}">

<meta property="og:image:width" content="600">
<meta property="og:image:height" content="315">

<meta property="og:url"
content="{{ request.build_absolute_uri }}">

<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ product.title }}">
<meta name="twitter:description" content="{{ product.meta_description }}">
<meta name="twitter:image"
content="https://res.cloudinary.com/dvoqsrkkq/image/fetch/c_fit,w_600,h_315,q_auto/{{ product.variants.all.0.image_url }}">
