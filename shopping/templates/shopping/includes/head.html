{% load static %}
<meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Uttar World Elite Lifestyle Store{% endblock %}</title>

    <link rel="canonical" href="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="icon" href="{% static 'images/favicon.ico' %}">
<link rel="shortcut icon" href="{% static 'images/favicon.ico' %}">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">



{% block extra_head %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Uttar World Elite Lifestyle Store",
  "url": "https://www.uttarworld.com",
  "logo": "https://www.uttarworld.com/static/images/uttarworld-shopping-icon.png"
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Uttar World Elite Lifestyle Store",
  "url": "https://www.uttarworld.com",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://www.uttarworld.com/search/?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
{% endblock %}





{% block meta %}
        
        <meta name="description" content="Uttar World is your premium destination for curated global fashion, innovative gadgets, and lifestyle essentials.">
        
        <meta property="og:url" content="{{ request.build_absolute_uri }}" />
        <meta property="og:type" content="website" />

        {% if product %}
            <meta property="og:title" content="Uttar World - {{ product.title }}">
            <meta property="og:description" content="{{ product.description|truncatewords:20 }}">
            <meta property="og:image" content="{{ product.variants.all.0.image_url }}">
        {% else %}
            <meta property="og:title" content="Uttar World Elite Lifestyle Store">
            <meta property="og:description" content="Shop premium fashion and gadgets at Uttar World.">
            {% if category and category.image %}
                <meta property="og:image" content="{{ category.image.url }}">
            {% else %}
                <meta property="og:image" content="https://www.uttarworld.com/static/images/logo.png">
            {% endif %}
        {% endif %}
    {% endblock %}

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ adsense_client }}" crossorigin="anonymous"></script>
    

    <style>
        :root { --amazon-orange: #ff9900; --deep-black: #1a1a1a; }
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        
        .shop-navbar { background: #ffffff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; padding: 10px 0; }
        .brand-logo-img { height: 40px; }
        
        /* Search Bar Styles */
        .search-form { display: flex; align-items: center; }
        .search-input { border-radius: 20px 0 0 20px; border: 1px solid #ced4da; padding: 8px 15px; }
        .search-btn { border-radius: 0 20px 20px 0; background: var(--amazon-orange); color: white; border: none; padding: 8px 15px; }
        
        .dynamic-nav-strip { background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%); padding: 12px 0; border-top: 3px solid var(--amazon-orange); }
        .nav-link-custom { color: #e2e8f0 !important; font-size: 13px; font-weight: 700; text-transform: uppercase; text-decoration: none; }
        
        .carousel-item img { height: 450px; width: 100%; object-fit: cover; }
        @media (max-width: 768px) { .carousel-item img { height: 250px; } }


    </style>
