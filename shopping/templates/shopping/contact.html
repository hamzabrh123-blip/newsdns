{% extends 'shopping/shop_base.html' %}
{% load static %}

{% block content %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "name": "Contact Us - Uttar World",
  "description": "Get in touch with Uttar World for any inquiries, support, or feedback regarding our products.",
  "url": "{{ request.build_absolute_uri }}",
  "mainEntity": {
    "@type": "Organization",
    "name": "Uttar World",
    "url": "{{ request.scheme }}://{{ request.get_host }}",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "email": "uttarworld.com@gmail.com",
      "areaServed": "IN",
      "availableLanguage": "Hindi, English"
    },
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Bahraich",
      "addressRegion": "Uttar Pradesh",
      "addressCountry": "IN"
    }
  }
}
</script>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card p-5 shadow-sm border-0 rounded-lg text-center">
                <h2 class="fw-bold mb-3">Contact Us</h2>
                <p class="text-muted mb-4">We would love to hear from you! Reach out to us for any queries.</p>
                
                <div class="d-flex flex-column align-items-center">
                    <div class="mb-3">
                        <i class="fas fa-envelope fa-2x text-primary mb-2"></i>
                        <p class="mb-0">Email us at:</p>
                        <strong>uttarworld.com@gmail.com</strong>
                    </div>
                    
                    <div class="mt-3">
                        <i class="fas fa-map-marker-alt fa-2x text-danger mb-2"></i>
                        <p class="mb-0">Our Location:</p>
                        <strong>Bahraich, Uttar Pradesh, India</strong>
                    </div>
                </div>
                
                <div class="mt-4">
                    <a href="mailto:uttarworld.com@gmail.com" class="btn btn-primary px-4">Send an Email</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
