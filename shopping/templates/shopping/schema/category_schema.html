<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "{{ category.name|escapejs }}",
  "description": "{{ category.description|striptags|truncatechars:160|escapejs }}",
  "url": "{{ request.build_absolute_uri }}",
  "mainEntity": {
    "@type": "ItemList",
    "itemListElement": [
      {% for product in products|slice:":20" %}
      {
        "@type": "ListItem",
        "position": {{ forloop.counter }},
        "item": {
          "@type": "WebPage", 
          "name": "{{ product.title|escapejs }}",
          "url": "{{ request.scheme }}://{{ request.get_host }}{{ product.get_absolute_url }}",
          "image": "https://res.cloudinary.com/dvoqsrkkq/image/fetch/f_auto,q_auto/{{ product.variants.all.0.image_url|default:'/static/images/default.png' }}"
        }
      }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ]
  }
}
</script>
