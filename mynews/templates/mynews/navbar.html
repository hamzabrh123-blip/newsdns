{% load static %}

<div class="py-1 d-none d-lg-block top-bar-wrapper" style="background: #ffffff; border-bottom: 1px solid #eee; position: relative; z-index: 1060;">
    <div class="container d-flex justify-content-between align-items-center">
        <div id="google_translate_element"></div>
        <div class="social-links">
            <a href="#" class="text-dark me-3"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="text-dark me-3"><i class="fab fa-twitter"></i></a>
            <a href="#" class="text-dark"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg fixed-top main-navbar-custom">
    <div class="container" style="overflow: visible !important;">
        <div class="d-flex align-items-center">
            <a href="{% url 'home' %}" class="navbar-brand me-0">
                <img src="{% static 'logo.png' %}" alt="Logo" width="45" height="45" class="logo-glow">
            </a>
            <div class="ms-2 brand-text-container">
                <span class="brand-title">UTTAR WORLD</span><br>
                <span class="brand-subtitle">NEWS</span>
            </div>
        </div>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <i class="fas fa-bars text-white"></i>
        </button>

        <div class="collapse navbar-collapse" id="mainNav" style="overflow: visible !important;">
            <ul class="navbar-nav mx-auto" style="overflow: visible !important;">
                <li class="nav-item"><a class="nav-link home-special-btn" href="{% url 'home' %}">HOME</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'district_news' 'International' %}">WORLD</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'district_news' 'National' %}">INDIA</a></li>
                <li class="nav-item"><a class="nav-link text-nowrap" href="{% url 'district_news' 'Uttar-Pradesh' %}">UTTAR PRADESH</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'district_news' 'Delhi' %}">DELHI</a></li>

                <li class="nav-item dropdown custom-h-dropdown" style="position: relative !important;">
                    <a class="nav-link dropdown-toggle no-border-fix" href="#" id="entDropdown" role="button">
                        ENTERTAINMENT
                    </a>
                    <ul class="dropdown-menu shadow-lg" aria-labelledby="entDropdown">
                        <li><a class="dropdown-item" href="{% url 'district_news' 'Bollywood' %}">BOLLYWOOD</a></li>
                        <li><a class="dropdown-item" href="{% url 'district_news' 'Hollywood' %}">HOLLYWOOD</a></li>
                    </ul>
                </li>

                <li class="nav-item"><a class="nav-link" href="{% url 'district_news' 'Technology' %}">TECH</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'district_news' 'Market' %}">MARKET</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'district_news' 'Sports' %}">SPORTS</a></li>
            </ul>

            <form class="d-flex search-box-container" action="{% url 'home' %}" method="get">
                <div class="input-group">
                    <input class="form-control border-0 search-input" type="search" name="q" placeholder="खोजें...">
                    <button class="btn btn-warning search-btn" type="submit"><i class="fas fa-search"></i></button>
                </div>
            </form>
        </div>
    </div>
</nav>

<div class="nav-spacer d-none d-lg-block" style="height: 100px;"></div>
<div class="nav-spacer d-lg-none" style="height: 70px;"></div>

<style>
    /* Navbar Base */
    .main-navbar-custom {
        background: linear-gradient(to right, #800000, #4a0000) !important;
        border-bottom: 3px solid #ffcc00 !important;
        z-index: 99999 !important;
        overflow: visible !important;
    }

    .brand-title { color: white; font-weight: 800; font-size: 1.3rem; line-height: 1.1; }
    .brand-subtitle { color: #ffcc00; letter-spacing: 4px; font-size: 0.6rem; font-weight: 900; }

    /* Links Fix - Removing any invisible borders */
    .navbar-nav .nav-link { 
        color: #fff !important; 
        font-size: 0.72rem; 
        font-weight: 700; 
        padding: 0.8rem 10px !important; 
        text-transform: uppercase;
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
    }
    
    .home-special-btn { background: #ffcc00 !important; color: #000 !important; border-radius: 4px; margin-right: 5px; text-align: center; }

    /* Desktop Dropdown - Double Line Remover */
    @media (min-width: 992px) {
        .custom-h-dropdown:hover > .dropdown-menu {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .dropdown-menu {
            display: none;
            position: absolute !important;
            /* Negative margin navbar की बॉर्डर के ऊपर बैठने के लिए */
            top: 100% !important;
            margin-top: -3px !important; 
            left: 0 !important;
            background: #ffffff !important;
            
            /* Borders */
            border: none !important;
            border-left: 1px solid #ddd !important;
            border-right: 1px solid #ddd !important;
            border-bottom: 4px solid #ffcc00 !important;
            
            min-width: 200px !important;
            padding: 0 !important;
            z-index: 1000000 !important;
            border-radius: 0 0 8px 8px !important;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3) !important;
        }

        .dropdown-item {
            font-weight: 700 !important;
            font-size: 0.85rem !important;
            color: #4a0000 !important;
            padding: 12px 20px !important;
            border-bottom: 1px solid #f1f1f1 !important;
        }
        .dropdown-item:last-child { border-bottom: none !important; }
        .dropdown-item:hover { background-color: #800000 !important; color: #fff !important; }
    }

    /* Search Box */
    .search-input { font-size: 0.8rem; border-radius: 20px 0 0 20px !important; height: 34px; }
    .search-btn { border-radius: 0 20px 20px 0 !important; height: 34px; background: #ffcc00; border: none; }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const dropdown = document.querySelector('.custom-h-dropdown');
        if(dropdown) {
            dropdown.addEventListener('mouseenter', function() {
                document.querySelectorAll('.row, section, .container').forEach(el => {
                    if(!el.contains(dropdown)) el.style.zIndex = "1";
                });
            });
            dropdown.addEventListener('mouseleave', function() {
                document.querySelectorAll('.row, section, .container').forEach(el => {
                    el.style.zIndex = "";
                });
            });
        }
    });
</script>
