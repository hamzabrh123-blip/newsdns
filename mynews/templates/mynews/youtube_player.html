<div id="yt-player-container" style="display:none; margin-top: 20px;">
    <div class="ratio-16x9">
        <div id="player"></div>
    </div>
</div>

{% if news.youtube_url %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoObject",
  "name": "{{ news.title|striptags|addslashes }}",
  "description": "{{ news.content|striptags|truncatewords:30|addslashes }}",
  "thumbnailUrl": "{% if news.image_url %}{{ news.image_url }}{% elif news.image %}{{ request.scheme }}://{{ request.get_host }}{{ news.image.url }}{% else %}{{ request.scheme }}://{{ request.get_host }}/static/districts/news.webp{% endif %}",
  "uploadDate": "{{ news.date|date:'c' }}",
  "embedUrl": "{{ news.youtube_url }}",
  "publisher": {
    "@type": "Organization",
    "name": "Uttar World",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ request.scheme }}://{{ request.get_host }}/static/logo.png"
    }
  }
}
</script>
{% endif %}

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        var videoUrl = "{{ news.youtube_url|default:'' }}"; 
        var videoId = "";
        if (videoUrl) {
            var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            var match = videoUrl.match(regExp);
            if (match && match[2].length == 11) {
                videoId = match[2];
            }
        }
        if (videoId) {
            document.getElementById('yt-player-container').style.display = 'block';
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                videoId: videoId,
                playerVars: { 'playsinline': 1, 'rel': 0 }
            });
        }
    }
</script>
